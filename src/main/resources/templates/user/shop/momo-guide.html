<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/user}">
<head><title>Thanh toán</title></head>
<body>
<main layout:fragment="content">
    <div class="axil-checkout-area axil-section-gap">
        <div class="container">
            <h3 class="mb-3">Phương thức thanh toán không còn hỗ trợ</h3>
            <p class="text-muted">Vui lòng quay lại trang thanh toán để chọn một phương thức hợp lệ hiện đang được hệ thống hỗ trợ.</p>

            <div class="d-flex gap-2">
                <a th:href="@{/checkout}" class="axil-btn btn-outline">Chọn phương thức khác</a>
            </div>
        </div>
    </div>
</main>
</body>
</html>
