<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{/layouts/admin}">
<head>
    <title th:text="${isEditMode ? 'Sửa Khuyến mãi' : 'Thêm Khuyến mãi'}"></title>
</head>
<body>
<h4 class="fw-bold py-3 mb-4" layout:fragment="page_title">
    <span class="text-muted fw-light">Khuyến mãi / </span>
    <span th:text="${isEditMode ? 'Chỉnh sửa' : 'Thêm mới'}"></span>
</h4>
<main layout:fragment="content">
    <!-- Action của form vẫn sạch sẽ -->
    <form th:action="@{/admin/voucher/save}" th:object="${voucherRequest}" method="post">
        <div class="card">
            <div class="card-body">
                <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
                    <span th:text="${errorMessage}"></span>
                </div>

                <input type="hidden" name="page" th:value="${page}">
                <input type="hidden" name="size" th:value="${size}">
                <input type="hidden" name="filterKeyword" th:value="${keyword}">
                <input type="hidden" name="filterStatus" th:value="${status}">
                <input type="hidden" name="filterKieuApDung" th:value="${filterKieuApDung}">
                <input type="hidden" name="isEditMode" th:value="${isEditMode}">

                <div class="row">
                    <div class="mb-3 col-md-6">
                        <label class="form-label">Mã khuyến mãi <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <input type="text" th:field="*{voucherCode}" class="form-control text-uppercase" required th:readonly="${isEditMode}" placeholder="Tự nhập hoặc tạo ngẫu nhiên">
                            <button class="btn btn-outline-secondary" type="button" id="generate-voucher-code-btn" th:disabled="${isEditMode}">Tạo mã</button>
                        </div>
                    </div>
                    <div class="mb-3 col-md-6"><label class="form-label">Tên chiến dịch <span class="text-danger">*</span></label><input type="text" th:field="*{campaignName}" class="form-control" required></div>

                    <div class="mb-3 col-md-6">
                        <label class="form-label">Kiểu áp dụng <span class="text-danger">*</span></label>
                        <select th:field="*{discountType}" class="form-select" required>
                            <option value="PERCENTAGE">Phần trăm (%)</option>
                            <option value="FIXED_AMOUNT">Số tiền cố định (₫)</option>
                        </select>
                    </div>

                    <div class="mb-3 col-md-6"><label class="form-label">Giá trị <span class="text-danger">*</span></label><input type="number" th:field="*{value}" class="form-control" required placeholder="Nếu là %, nhập 10. Nếu là tiền, nhập 10000"></div>
                    <div class="mb-3 col-md-6"><label class="form-label">Bắt đầu lúc <span class="text-danger">*</span></label><input type="datetime-local" th:field="*{startsAt}" class="form-control" required></div>
                    <div class="mb-3 col-md-6"><label class="form-label">Kết thúc lúc <span class="text-danger">*</span></label><input type="datetime-local" th:field="*{endsAt}" class="form-control" required></div>
                    <div class="mb-3 col-md-6"><label class="form-label">Đơn hàng tối thiểu (₫)</label><input type="number" th:field="*{minimumOrderAmount}" class="form-control" placeholder="Để trống nếu không yêu cầu"></div>
                    <div class="mb-3 col-md-6"><label class="form-label">Giảm tối đa (₫)</label><input type="number" th:field="*{maxDiscountAmount}" class="form-control" placeholder="Chỉ áp dụng cho kiểu Phần trăm"></div>
                    <div class="mb-3 col-md-6"><label class="form-label">Giới hạn tổng số lần sử dụng</label><input type="number" th:field="*{totalUsageLimit}" class="form-control" placeholder="Để trống nếu không giới hạn"></div>
                    <div class="mb-3 col-md-6"><label class="form-label">Giới hạn mỗi người dùng</label><input type="number" th:field="*{perUserLimit}" class="form-control" placeholder="Để trống nếu không giới hạn"></div>
                    <div class="mb-3 col-md-12"><label class="form-label">Trạng thái <span class="text-danger">*</span></label><select th:field="*{status}" class="form-select"><option value="ACTIVE">Hoạt động</option><option value="DISABLED">Ngừng</option><option value="EXPIRED">Hết hạn</option><option value="USED_UP">Hết lượt</option></select></div>
                </div>
                <div class="mt-3">
                    <a th:href="@{/admin/voucher(page=${page}, size=${size}, filterKeyword=${keyword}, filterStatus=${status}, filterKieuApDung=${filterKieuApDung})}" class="btn btn-outline-secondary">Hủy</a>
                    <button type="submit" class="btn btn-primary" th:text="${isEditMode ? 'Cập nhật' : 'Lưu'}"></button>
                </div>
            </div>
        </div>
    </form>
</main>
</body>
</html>
